name: CI/CD Pipeline Demo

# 1. Triggers: Run the pipeline automatically on push or PR to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Continuous Integration (CI) Phase
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter & Security Scan
      run: npm run lint

    - name: Run Unit Tests
      run: npm test

    - name: Build Application Artifact
      run: npm run build

  # Continuous Deployment (CD) Phase
  deploy:
    needs: build-and-test # Only runs if the CI phase succeeds
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only deploy code from the main branch

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          mydockeruser/demo-app:latest
          mydockeruser/demo-app:${{ github.sha }}

    - name: Simulate Production Deployment
      run: |
        echo "Connecting to the production environment..."
        echo "Pulling image: mydockeruser/demo-app:${{ github.sha }}"
        echo "Deploying application successfully!"
